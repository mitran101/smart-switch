<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Comments Admin | SwitchInsights</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F172A; color: #E2E8F0; font-family: system-ui, sans-serif; font-size: 0.9rem; line-height: 1.6; }
    #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .auth-box { background: #1E293B; border: 1px solid rgba(168,85,247,0.3); border-radius: 12px; padding: 2rem; width: 320px; text-align: center; }
    .auth-box h1 { font-size: 1.1rem; margin-bottom: 1.25rem; color: #fff; }
    .auth-box input { width: 100%; background: #0F172A; border: 1px solid rgba(168,85,247,0.3); border-radius: 8px; color: #E2E8F0; padding: 0.6rem 0.9rem; font-size: 0.9rem; margin-bottom: 0.75rem; outline: none; font-family: inherit; }
    .auth-box button { background: linear-gradient(135deg, #A855F7, #EC4899); color: #fff; border: none; border-radius: 8px; padding: 0.6rem 1.5rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .auth-error { color: #F87171; font-size: 0.82rem; margin-top: 0.5rem; min-height: 1rem; }

    #app { display: none; padding: 2rem; max-width: 960px; margin: 0 auto; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .page-header h1 { font-size: 1.3rem; color: #fff; }
    .tabs { display: flex; gap: 0.5rem; }
    .tab { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25); border-radius: 8px; padding: 0.4rem 1rem; font-size: 0.82rem; font-weight: 600; cursor: pointer; color: rgba(226,232,240,0.7); transition: all 0.15s; }
    .tab.active { background: rgba(168,85,247,0.25); border-color: #A855F7; color: #fff; }
    .badge { display: inline-block; background: #EC4899; color: #fff; border-radius: 10px; padding: 0.1rem 0.45rem; font-size: 0.7rem; font-weight: 700; margin-left: 0.35rem; }

    .comment-card { background: #1E293B; border: 1px solid rgba(168,85,247,0.2); border-radius: 10px; padding: 1.1rem 1.25rem; margin-bottom: 0.75rem; }
    .comment-card.reply { border-left: 3px solid #EC4899; }
    .comment-meta { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; align-items: baseline; margin-bottom: 0.5rem; }
    .comment-author { font-weight: 700; color: #fff; }
    .comment-slug { font-size: 0.75rem; color: #A855F7; background: rgba(168,85,247,0.12); border-radius: 6px; padding: 0.1rem 0.5rem; }
    .comment-time { font-size: 0.75rem; color: rgba(226,232,240,0.4); }
    .reply-tag { font-size: 0.72rem; color: #EC4899; font-weight: 700; }
    .comment-text { color: rgba(226,232,240,0.85); margin-bottom: 0.85rem; font-size: 0.88rem; white-space: pre-wrap; }
    .comment-actions { display: flex; gap: 0.5rem; }
    .btn-approve { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); color: #10B981; border-radius: 6px; padding: 0.3rem 0.85rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-approve:hover { background: rgba(16,185,129,0.3); }
    .btn-delete { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.35); color: #F87171; border-radius: 6px; padding: 0.3rem 0.85rem; font-size: 0.8rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-delete:hover { background: rgba(239,68,68,0.25); }

    .empty { color: rgba(226,232,240,0.35); font-style: italic; padding: 1.5rem 0; text-align: center; }
    .loading { color: rgba(226,232,240,0.35); padding: 1.5rem 0; text-align: center; }
    .panel { display: none; }
    .panel.active { display: block; }
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #1E293B; border: 1px solid rgba(168,85,247,0.4); border-radius: 10px; padding: 0.75rem 1.25rem; font-size: 0.85rem; color: #E2E8F0; transform: translateY(100px); transition: transform 0.25s; z-index: 999; }
    .toast.show { transform: translateY(0); }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <div class="auth-box">
    <h1>🔒 Comments Admin</h1>
    <input type="password" id="pw-input" placeholder="Password" />
    <br>
    <button onclick="checkAuth()">Sign in</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="page-header">
    <h1>Comments Admin</h1>
    <div class="tabs">
      <div class="tab active" onclick="showTab('pending')" id="tab-pending">
        Pending <span class="badge" id="pending-count">…</span>
      </div>
      <div class="tab" onclick="showTab('approved')" id="tab-approved">Approved</div>
    </div>
  </div>

  <div class="panel active" id="panel-pending">
    <div class="loading" id="pending-loading">Loading…</div>
    <div id="pending-list"></div>
  </div>

  <div class="panel" id="panel-approved">
    <div class="loading" id="approved-loading">Loading…</div>
    <div id="approved-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://jkiyisnoetcxndwtqoom.supabase.co';
  const ANON_KEY = 'sb_publishable_UJOFqh8sPlZHAx56_hJXaw_N1onof2T';
  const ADMIN_PASSWORD = 'energyswitchingisgood'; // Change this in Supabase RPC functions too

  let adminPass = '';

  function checkAuth() {
    const pw = document.getElementById('pw-input').value;
    if (pw === ADMIN_PASSWORD) {
      adminPass = pw;
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadPending();
      loadApproved();
    } else {
      document.getElementById('auth-error').textContent = 'Incorrect password.';
    }
  }
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkAuth();
  });

  const H = {
    'apikey': ANON_KEY,
    'Authorization': 'Bearer ' + ANON_KEY,
    'Content-Type': 'application/json',
  };

  async function rpc(fn, params) {
    const r = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
      method: 'POST', headers: H,
      body: JSON.stringify({ admin_pass: adminPass, ...params }),
    });
    if (!r.ok) { const e = await r.text(); throw new Error(e); }
    const ct = r.headers.get('content-type') || '';
    if (ct.includes('json')) return r.json();
    return null;
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function relTime(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  function cardHTML(c, showApprove) {
    return `
      <div class="comment-card ${c.parent_id ? 'reply' : ''}" id="card-${c.id}">
        <div class="comment-meta">
          <span class="comment-author">${esc(c.author_name)}</span>
          <span class="comment-slug">${esc(c.article_slug)}</span>
          <span class="comment-time">${relTime(c.created_at)}</span>
          ${c.parent_id ? '<span class="reply-tag">↩ Reply</span>' : ''}
        </div>
        <div class="comment-text">${esc(c.comment_text)}</div>
        <div class="comment-actions">
          ${showApprove ? `<button class="btn-approve" onclick="approveComment('${c.id}')">✓ Approve</button>` : ''}
          <button class="btn-delete" onclick="deleteComment('${c.id}')">✕ Delete</button>
        </div>
      </div>`;
  }

  async function loadPending() {
    document.getElementById('pending-loading').style.display = 'block';
    try {
      const data = await rpc('get_pending_comments', {});
      document.getElementById('pending-loading').style.display = 'none';
      document.getElementById('pending-count').textContent = data.length || '0';
      const list = document.getElementById('pending-list');
      if (!data.length) { list.innerHTML = '<div class="empty">No pending comments.</div>'; return; }
      list.innerHTML = data.map(c => cardHTML(c, true)).join('');
    } catch(e) {
      document.getElementById('pending-loading').textContent = 'Error loading: ' + e.message;
    }
  }

  async function loadApproved() {
    document.getElementById('approved-loading').style.display = 'block';
    try {
      const data = await rpc('get_approved_comments', {});
      document.getElementById('approved-loading').style.display = 'none';
      const list = document.getElementById('approved-list');
      if (!data.length) { list.innerHTML = '<div class="empty">No approved comments yet.</div>'; return; }
      list.innerHTML = data.map(c => cardHTML(c, false)).join('');
    } catch(e) {
      document.getElementById('approved-loading').textContent = 'Error loading: ' + e.message;
    }
  }

  async function approveComment(id) {
    try {
      await rpc('approve_comment', { comment_id: id });
      document.getElementById('card-' + id)?.remove();
      const count = document.getElementById('pending-count');
      count.textContent = Math.max(0, parseInt(count.textContent) - 1);
      toast('Comment approved.');
      loadApproved();
    } catch(e) { toast('Error: ' + e.message); }
  }

  async function deleteComment(id) {
    if (!confirm('Delete this comment?')) return;
    try {
      await rpc('delete_comment', { comment_id: id });
      document.getElementById('card-' + id)?.remove();
      toast('Comment deleted.');
    } catch(e) { toast('Error: ' + e.message); }
  }

  function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('panel-' + name).classList.add('active');
  }
</script>
</body>
</html>
