<!DOCTYPE html>
<html>
<head>
    <title>Unsubscribe - SwitchPilot</title>
    
    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #0c0e1f;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 500px;
            padding: 3rem;
            background: rgba(17,22,46,0.95);
            border-radius: 20px;
            text-align: center;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { opacity: 0.85; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Processing unsubscribe...</h1>
        <p>Please wait...</p>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://jkiyisnoetcxndwtqoom.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_UJOFqh8sPlZHAx56_hJXaw_N1onof2T';

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        async function processUnsubscribe() {
            if (!token) {
                document.querySelector('.container').innerHTML = `
                    <h1 style="color: #fca5a5;">Invalid Link</h1>
                    <p>No unsubscribe token found.</p>
                `;
                return;
            }

            try {
                const res = await fetch(
                    SUPABASE_URL + '/functions/v1/unsubscribe',
                    {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': 'Bearer ' + SUPABASE_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ token })
                    }
                );

                if (res.ok) {
                    document.querySelector('.container').innerHTML = `
                        <h1>✅ Unsubscribed</h1>
                        <p>You've been removed from our mailing list.</p>
                    `;
                } else {
                    document.querySelector('.container').innerHTML = `
                        <h1 style="color: #fca5a5;">Something went wrong</h1>
                        <p>Please email <a href="mailto:team@switch-pilot.com" style="color:#10B981;">team@switch-pilot.com</a> to unsubscribe.</p>
                    `;
                }
            } catch (err) {
                document.querySelector('.container').innerHTML = `
                    <h1 style="color: #fca5a5;">Invalid Link</h1>
                    <p>This unsubscribe link appears to be invalid.</p>
                `;
            }
        }

        processUnsubscribe();
    </script>
</body>
</html>
