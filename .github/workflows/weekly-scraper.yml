name: Daily Tariff Scraper
on:
  schedule:
    - cron: '0 4 * * 1-5'  # 4am UTC, Monday-Friday
  workflow_dispatch:
    inputs:
      only:
        description: 'Run specific scrapers only (e.g. eon or eon bg). Leave blank for all.'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: pip install playwright requests

    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-v1

    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: |
        playwright install chromium firefox
        playwright install-deps chromium firefox

    - name: Install Playwright deps (cached browsers)
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: playwright install-deps chromium firefox

    - name: Run scrapers
      run: |
        ONLY="${{ github.event.inputs.only }}"
        if [ -n "$ONLY" ]; then
          echo "Running specific scrapers: $ONLY"
          python run_all_scrapers.py --only $ONLY
        else
          python run_all_scrapers.py
        fi
      continue-on-error: true
      env:
        PYTHONUNBUFFERED: "1"

    - name: Upload screenshots for debugging
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: debug-screenshots
        path: screenshots/
        retention-days: 7

    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add all_tariffs.json tariff_data_latest.json all_tariffs_*.csv
        git diff --staged --quiet || git commit -m "Daily update: $(date +'%Y-%m-%d %H:%M')"
        git push || echo "Nothing to push"
