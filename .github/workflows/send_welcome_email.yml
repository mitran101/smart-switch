name: Send Welcome Email

on:
  repository_dispatch:
    types: [user_verified]

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Send welcome email
        env:
          MICROSOFT_EMAIL: ${{ secrets.MICROSOFT_EMAIL }}
          MICROSOFT_PASSWORD: ${{ secrets.MICROSOFT_PASSWORD }}
        run: |
          python send_welcome_email.py "${{ github.event.client_payload.email }}"

      - name: Save sent log
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add welcome_sent.txt
          git diff --staged --quiet || git commit -m "Log welcome email sent"
          git push || echo "Nothing to push"
