                        const best = allFixed
                            .filter(t => t.supplier === supplier && t.region === region)
                            .sort((a, b) => a.annualCost - b.annualCost)[0];
                        if (best) regionCosts.push(best.annualCost);
                    });
                    if (regionCosts.length > 0) {
                        avgCosts[supplier] = Math.round(regionCosts.reduce((a, b) => a + b, 0) / regionCosts.length);
                    }
                });

                if (avgCosts.fuse_energy) {
                    document.getElementById('tipFuse').textContent = avgCosts.fuse_energy.toLocaleString();
                    document.getElementById('tipSaving').textContent = (PRICE_CAP_ANNUAL - avgCosts.fuse_energy).toLocaleString();
                }
                // Show next cheapest dual-fuel fixed supplier
                const otherSupplier = avgCosts.ovo || avgCosts.british_gas || avgCosts.scottish_power;
                const otherName = avgCosts.ovo ? 'OVO' : avgCosts.british_gas ? 'British Gas' : 'Scottish Power';
                if (otherSupplier) {
                    document.getElementById('tipOctopus').textContent = otherSupplier.toLocaleString();
                    document.getElementById('tipOctopusLabel').textContent = otherName + ' Fixed';
                }

                // Calculate average savings across ALL regions: Fuse fixed vs regional SVT
                const heroRegions = [...new Set(data.tariffs.map(t => t.region))];
                const regionSavings = [];
                
                heroRegions.forEach(region => {
                    const regionTariffs = data.tariffs.filter(t => t.region === region && !t.error);
                    
                    // Best Fuse fixed tariff in this region
                    const fuseBest = regionTariffs
                        .filter(t => t.supplier === 'fuse_energy')
                        .filter(t => t.elec_unit_rate_p && t.gas_unit_rate_p)
                        .filter(t => {
                            const name = (t.tariff_name || '').toLowerCase();
                            return !name.includes('variable') && !name.includes('tracker') && !name.includes('agile');
                        })
                        .map(t => ({ ...t, annualCost: calculateAnnualCost(t) }))
                        .sort((a, b) => a.annualCost - b.annualCost)[0];
                    
                    // SVT/variable tariff for this region (any supplier)
                    const svt = regionTariffs
                        .filter(t => t.elec_unit_rate_p && t.gas_unit_rate_p)
                        .filter(t => {
                            const name = (t.tariff_name || '').toLowerCase();
                            return name.includes('variable') || name.includes('svt') || name.includes('standard');
                        })
                        .map(t => ({ ...t, annualCost: calculateAnnualCost(t) }))
                        .sort((a, b) => b.annualCost - a.annualCost)[0]; // most expensive SVT
                    
                    if (fuseBest && svt) {
                        const saving = svt.annualCost - fuseBest.annualCost;
                        if (saving > 0) regionSavings.push(saving);
                    } else if (fuseBest) {
                        // Fallback: compare vs price cap
                        const saving = PRICE_CAP_ANNUAL - fuseBest.annualCost;
                        if (saving > 0) regionSavings.push(saving);
                    }
                });
                
                if (regionSavings.length > 0) {
                    const minSaving = Math.round(Math.min(...regionSavings));
                    const maxSaving = Math.round(Math.max(...regionSavings));
                    const heroEl = document.getElementById('heroSavings');
                    if (minSaving === maxSaving) {
                        heroEl.textContent = '£' + minSaving;
                    } else {
                        heroEl.textContent = '£' + minSaving + '-' + maxSaving;
                    }
document.getElementById('heroSubtext').textContent = 
                        'Average across ' + regionSavings.length + ' UK regions. Fuse fixed vs standard variable tariffs.';
                    
                    // Update hardcoded savings text
                    const savingText = minSaving === maxSaving 
                        ? minSaving.toString() 
                        : minSaving + '-' + maxSaving;
                    const verdictEl = document.getElementById('verdictSaving');
                    const takeawayEl = document.getElementById('takeawaySaving');
                    if (verdictEl) verdictEl.textContent = savingText;
                    if (takeawayEl) takeawayEl.textContent = savingText;
                }
                
            } catch (e) {
                console.error('Failed to load tariff data:', e);
                // Fall back to static chart if data fails
                renderStaticChart();
            }
        }

        function updateComparisonTable(allTariffs) {
            const regions = [...new Set(allTariffs.filter(t => !t.error).map(t => t.region))].sort();
            const tableBody = document.getElementById('tariffTableBody');
            if (!tableBody) return;

            let html = '';
            regions.forEach(region => {
                const regionTariffs = allTariffs.filter(t => t.region === region && !t.error);
                
                const fuse = regionTariffs.find(t => t.supplier === 'fuse_energy');
                const ovo = regionTariffs.find(t => t.supplier === 'ovo' && 
                    (t.tariff_name || '').toLowerCase().includes('fixed'));
                const bg = regionTariffs.find(t => t.supplier === 'british_gas');
                
                html += `<tr>
                    <td><strong>${region}</strong></td>
                    <td class="table-highlight">${fuse?.elec_unit_rate_p?.toFixed(2) || '-'}</td>
                    <td>${ovo?.elec_unit_rate_p?.toFixed(2) || '-'}</td>
                    <td>${bg?.elec_unit_rate_p?.toFixed(2) || '-'}</td>
                    <td>${fuse?.gas_unit_rate_p?.toFixed(2) || '-'}</td>
                </tr>`;
            });
            
            tableBody.innerHTML = html;
        }

        function updateSupplierChart(tariffs) {
            // Average the cheapest tariff per region for each supplier
            const suppliers = ['fuse_energy', 'british_gas', 'ovo', 'scottish_power'];
            const allRegions = [...new Set(tariffs.map(t => t.region))];
            const chartData = [];
            
            suppliers.forEach(supplier => {
                const regionCosts = [];
                allRegions.forEach(region => {
                    const best = tariffs
                        .filter(t => t.supplier === supplier && t.region === region)
                        .sort((a, b) => a.annualCost - b.annualCost)[0];
                    if (best) regionCosts.push(best.annualCost);
                });
                if (regionCosts.length > 0) {
                    const avg = regionCosts.reduce((a, b) => a + b, 0) / regionCosts.length;
                    chartData.push({
                        label: supplierNames[supplier] || supplier,
                        cost: Math.round(avg)
                    });
                }
            });
            
            // Add price cap
            chartData.push({ label: 'Price Cap (SVT)', cost: PRICE_CAP_ANNUAL });
            chartData.sort((a, b) => a.cost - b.cost);

            const ctx = document.getElementById('supplierCompareChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartData.map(d => d.label),
                    datasets: [{
                        data: chartData.map(d => d.cost),
                        backgroundColor: chartData.map((d, i) => 
                            d.label === 'Price Cap (SVT)' ? '#ef4444' : 
                            i === 0 ? '#10B981' : '#8b5cf6'
                        ),
                        borderRadius: 6,
                        barThickness: 40
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `£${ctx.raw.toLocaleString()}/year`
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: false,
                            min: Math.min(...chartData.map(d => d.cost)) - 100,
                            ticks: { callback: v => `£${v.toLocaleString()}` },
                            grid: { color: '#f1f5f9' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { font: { size: 12, family: 'DM Sans' } }
                        }
                    }
                }
            });
        }

        function renderStaticChart() {
            // Fallback static data if JSON fails
            const ctx = document.getElementById('supplierCompareChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Fuse Energy', 'British Gas', 'OVO 1 Year', 'Price Cap (SVT)'],
                    datasets: [{
                        data: [1520, 1680, 1660, 1758],
                        backgroundColor: ['#10B981', '#64748b', '#64748b', '#ef4444'],
                        borderRadius: 6,
                        barThickness: 40
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { beginAtZero: false, min: 1400, ticks: { callback: v => `£${v}` }, grid: { color: '#f1f5f9' } },
                        y: { grid: { display: false }, ticks: { font: { size: 12, family: 'DM Sans' } } }
                    }
                }
            });
        }

        // Crisis Scenario Chart (static - historical data)
        const crisisCtx = document.getElementById('crisisChart').getContext('2d');
        new Chart(crisisCtx, {
            type: 'line',
            data: {
                labels: ['Jan 21', 'Apr 21', 'Jul 21', 'Oct 21', 'Jan 22', 'Apr 22', 'Jul 22', 'Oct 22', 'Jan 23', 'Apr 23', 'Jul 23', 'Oct 23', 'Jan 24', 'Apr 24', 'Jul 24', 'Oct 24', 'Jan 25', 'Apr 25', 'Jul 25', 'Oct 25', 'Jan 26'],
                datasets: [{
                    label: 'Price Cap',
                    data: [1138, 1138, 1138, 1277, 1277, 1971, 1971, 3549, 4279, 3280, 2074, 1923, 1928, 1690, 1568, 1717, 1738, 1849, 1568, 1717, 1758],
                    borderColor: '#ef4444',
                    backgroundColor: 'rgba(239, 68, 68, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0
                }, {
                    label: 'Fixed Tariff Example',
                    data: [1100, 1100, 1100, 1100, 1100, 1100, 1400, 1400, 1400, 1400, 1400, 1600, 1600, 1600, 1600, 1600, 1550, 1550, 1550, 1550, 1520],
                    borderColor: '#10B981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    borderDash: [5, 5]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { size: 11, family: 'DM Sans' } }
                    },
                    tooltip: {
                        callbacks: {
                            label: ctx => `${ctx.dataset.label}: £${ctx.raw.toLocaleString()}/year`
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { 
                            font: { size: 10 },
                            maxRotation: 45,
                            minRotation: 45
                        }
                    },
                    y: {
                        beginAtZero: false,
                        min: 1000,
                        max: 4500,
                        ticks: { callback: v => `£${v.toLocaleString()}` },
                        grid: { color: '#f1f5f9' }
                    }
                }
            }
        });

        // Load data on page load
        loadTariffData();
    </script>
