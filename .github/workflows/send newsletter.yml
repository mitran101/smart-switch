name: Send Newsletter

on:
  schedule:
    - cron: '0 10 24 3 *'  # 10:00 AM UTC on March 24
  workflow_dispatch:
    inputs:
      mode:
        description: 'test (just you) or send (full list)'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - send

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests gspread google-auth

      - name: Send test email
        if: ${{ github.event.inputs.mode == 'test' }}
        env:
          MICROSOFT_EMAIL: ${{ secrets.MICROSOFT_EMAIL }}
          MICROSOFT_PASSWORD: ${{ secrets.MICROSOFT_PASSWORD }}
        run: python send_newsletter.py --test

      - name: Send to all subscribers
        if: ${{ github.event.inputs.mode == 'send' || github.event_name == 'schedule' }}
        env:
          MICROSOFT_EMAIL: ${{ secrets.MICROSOFT_EMAIL }}
          MICROSOFT_PASSWORD: ${{ secrets.MICROSOFT_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: |
          python fetch_subscribers.py > emails.txt
          if [ -s emails.txt ]; then
            echo "Found $(wc -l < emails.txt) subscribers"
            python send_newsletter.py --file emails.txt
          else
            echo "ERROR: No subscribers found. Check GOOGLE_SERVICE_ACCOUNT secret and sheet sharing."
            exit 1
          fi
