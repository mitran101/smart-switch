name: Send Newsletter

on:
  schedule:
    - cron: '0 10 7 3 *'  # 10:00 AM UTC (UK time) on March 7
  workflow_dispatch:
    inputs:
      mode:
        description: 'test (just you) or send (full list)'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - send

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Send test email
        if: ${{ github.event.inputs.mode == 'test' }}
        env:
          MICROSOFT_EMAIL: ${{ secrets.MICROSOFT_EMAIL }}
          MICROSOFT_PASSWORD: ${{ secrets.MICROSOFT_PASSWORD }}
        run: python send_newsletter.py --test

      - name: Send to all subscribers
        if: ${{ github.event.inputs.mode == 'send' || github.event_name == 'schedule' }}
        env:
          MICROSOFT_EMAIL: ${{ secrets.MICROSOFT_EMAIL }}
          MICROSOFT_PASSWORD: ${{ secrets.MICROSOFT_PASSWORD }}
        run: python send_newsletter.py --file emails.txt
